# Plugin CI — isolated testing + vendor convention enforcement
#
# Jobs:
#   1. validate — checks PR only modifies one vendor, validates conventions
#   2. test    — matrix: runs each plugin's tests in isolation
#   3. summary — aggregates results
#
# Key design: fail-fast: false → one vendor failure doesn't cancel others.

name: Plugin CI

on:
  pull_request:
    paths:
      - 'plugins/**'
      - 'pyproject.toml'
      - '.github/**'
      - 'specs/**'
      - 'scripts/**'
  push:
    branches: [main]
    paths:
      - 'plugins/**'
      - 'pyproject.toml'
  workflow_dispatch:  # Manual trigger via GitHub UI/API

jobs:
  # ── Validation: Vendor isolation + convention checks ──
  validate:
    name: Validate Vendor Conventions
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Need full history for diff

      - name: Check PR only modifies one vendor
        run: |
          echo "Checking PR diff for vendor isolation..."
          # Get list of changed vendor directories
          CHANGED_VENDORS=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | \
            grep '^plugins/vendor_' | \
            cut -d'/' -f2 | \
            sort -u)

          VENDOR_COUNT=$(echo "$CHANGED_VENDORS" | grep -c 'vendor_' || true)

          echo "Changed vendor directories:"
          echo "$CHANGED_VENDORS"

          if [ "$VENDOR_COUNT" -gt 1 ]; then
            echo "❌ PR modifies $VENDOR_COUNT vendors. Only ONE vendor allowed per PR."
            echo "   Each PR must be scoped to a single vendor directory."
            exit 1
          elif [ "$VENDOR_COUNT" -eq 0 ]; then
            echo "ℹ️  No vendor directories modified — skipping vendor isolation check"
          else
            echo "✅ Only one vendor modified: $CHANGED_VENDORS"
          fi

      - name: Set up Python
        if: always()
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run vendor validation script
        if: always()
        run: |
          echo "Running vendor convention validation..."
          python scripts/validate-vendor.py

  # ── Matrix: run all plugins in parallel ──
  test:
    name: Test ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    needs: validate
    if: |
      always() &&
      (needs.validate.result == 'success' || needs.validate.result == 'skipped')
    strategy:
      fail-fast: false  # One failure doesn't cancel others
      matrix:
        plugin:
          - ticketmaster
          # Add new vendors here as they're created:
          # - kktix
          # - ibon

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/shawnlin0125/plugin-hub.git#subdirectory=platform-plugin-sdk
          pip install -e ".[dev]"

      - name: Run ${{ matrix.plugin }} tests
        working-directory: plugins/vendor_${{ matrix.plugin }}
        run: |
          python -m pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Test report
        if: always()
        run: |
          echo "## ${{ matrix.plugin }} Test Results" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ **${{ matrix.plugin }}**: All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **${{ matrix.plugin }}**: Tests failed — check logs above" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Generate plugin manifest
        if: success()
        run: |
          python scripts/generate-manifest.py > plugin-manifest.json
          echo "📋 Manifest generated:"
          cat plugin-manifest.json

      - name: Commit manifest
        if: success() && github.ref == 'refs/heads/main'
        run: |
          git config user.name "CI Bot"
          git config user.email "ci@plugin-hub.local"
          git add plugin-manifest.json
          git diff --staged --quiet || (git commit -m "ci: update plugin-manifest.json" && git push)

  # ── Aggregate summary ──
  summary:
    name: CI Summary
    needs: [validate, test]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Overall status
        run: |
          echo "## CI Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.validate.result }}" = "success" ]; then
            echo "✅ **Validate**: Vendor conventions passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.validate.result }}" = "skipped" ]; then
            echo "⏭️ **Validate**: Skipped (not a PR)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **Validate**: Convention check failed" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ **Test**: All plugins passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️  **Test**: Some plugins failed — check individual results above" >> $GITHUB_STEP_SUMMARY
          fi
