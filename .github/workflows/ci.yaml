# Plugin CI — isolated testing per plugin
#
# Each plugin is tested independently.
# One plugin failing does NOT block other plugins.
#
# After CI passes, a plugin's status is recorded.
# plugin-hub checks this before enabling the plugin.

name: Plugin CI

on:
  pull_request:
    paths:
      - 'plugins/**'
  push:
    branches: [main]
    paths:
      - 'plugins/**'

jobs:
  # ── Matrix: run all plugins in parallel ──
  test:
    name: Test ${{ matrix.plugin }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # ← KEY: one failure doesn't cancel others
      matrix:
        plugin:
          - ticketmaster

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install git+https://github.com/shawnlin0125/plugin-hub.git#subdirectory=platform-plugin-sdk
          pip install -e ".[dev]"

      - name: Run ${{ matrix.plugin }} tests
        working-directory: plugins/vendor_ticketmaster
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Test report
        if: always()
        run: |
          echo "## ${{ matrix.plugin }} Test Results" >> $GITHUB_STEP_SUMMARY
          echo "| Plugin | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|" >> $GITHUB_STEP_SUMMARY
          if [ "${{ job.status }}" = "success" ]; then
            echo "| ${{ matrix.plugin }} | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ${{ matrix.plugin }} | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

  # ── Aggregate summary ──
  summary:
    name: CI Summary
    needs: test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Overall status
        run: |
          echo "All plugin tests completed."
          if [ "${{ needs.test.result }}" = "success" ]; then
            echo "✅ All plugins passed"
          else
            echo "⚠️  Some plugins failed — check individual results above"
          fi
